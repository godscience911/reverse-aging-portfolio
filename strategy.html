<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브랜드 · 콘텐츠 전략 제안서 — 구건우 · Mediology</title>
  <meta name="description" content="메디올로지 콘텐츠 마케팅 디자이너 지원 — 브랜드·콘텐츠 전략 제안서 전문">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:        #f8f5ef;
      --bg-2:      #f2ede3;
      --text:      #232e42;
      --text-soft: #4a5568;
      --muted:     #8b93a3;
      --line:      #e3dcc9;
      --sage:      #8ca98c;
      --sage-deep: #648264;
      --accent:    #d4a574;
      --card:      #ffffff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: var(--sage-deep); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
    a:hover { border-bottom-color: var(--sage-deep); }

    /* Header bar */
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(248,245,239,.92);
      backdrop-filter: saturate(1.4) blur(12px);
      -webkit-backdrop-filter: saturate(1.4) blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-bar .brand {
      font-weight: 700; font-size: 1rem;
      display: flex; align-items: center; gap: .55rem;
    }
    .top-bar .brand .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); }
    .top-bar .actions { display: flex; gap: .75rem; }
    .top-bar .actions a {
      font-size: .82rem; font-weight: 600;
      padding: .5rem 1rem; border-radius: 999px;
      border-bottom: none;
    }
    .top-bar .actions a.primary {
      background: var(--sage-deep); color: #fff;
    }
    .top-bar .actions a.primary:hover { background: var(--text); }
    .top-bar .actions a.ghost {
      border: 1px solid var(--line); color: var(--text-soft);
    }
    .top-bar .actions a.ghost:hover { border-color: var(--text); color: var(--text); }

    /* Intro block */
    .intro {
      max-width: 760px; margin: 0 auto;
      padding: 3rem 2rem 1rem;
    }
    .intro .eyebrow {
      font-size: .72rem; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; color: var(--sage-deep);
      margin-bottom: 1rem;
    }
    .intro h1 {
      font-size: clamp(2rem, 4.5vw, 2.8rem);
      font-weight: 800; letter-spacing: -.03em; line-height: 1.2;
      margin-bottom: 1.2rem;
    }
    .intro .meta {
      display: flex; flex-wrap: wrap; gap: 1.5rem;
      font-size: .88rem; color: var(--text-soft);
      padding-top: 1rem; border-top: 1px solid var(--line);
      margin-top: 1.5rem;
    }
    .intro .meta b { color: var(--text); font-weight: 700; }

    /* Doc body */
    .doc {
      max-width: 760px; margin: 0 auto;
      padding: 2rem 2rem 6rem;
      font-size: 1rem;
    }
    .doc h1 { display: none; } /* first h1 already shown in intro */
    .doc h2 {
      font-size: clamp(1.4rem, 3vw, 1.85rem);
      font-weight: 800; letter-spacing: -.025em;
      margin: 3.5rem 0 1.2rem;
      padding-top: 2rem; border-top: 1px solid var(--line);
      line-height: 1.3;
    }
    .doc h3 {
      font-size: 1.15rem; font-weight: 700; letter-spacing: -.015em;
      margin: 2.2rem 0 .9rem;
    }
    .doc h4 {
      font-size: 1rem; font-weight: 700;
      margin: 1.5rem 0 .6rem;
      color: var(--sage-deep);
    }
    .doc p { margin: 0 0 1.1rem; color: var(--text-soft); line-height: 1.85; }
    .doc p strong, .doc li strong { color: var(--text); font-weight: 700; }
    .doc ul, .doc ol { margin: 0 0 1.3rem 1.3rem; }
    .doc li { margin-bottom: .55rem; color: var(--text-soft); line-height: 1.8; }
    .doc hr {
      border: 0; border-top: 1px solid var(--line);
      margin: 3rem 0;
    }
    .doc blockquote {
      border-left: 3px solid var(--sage);
      padding: .9rem 1.4rem;
      margin: 1.5rem 0;
      background: var(--bg-2);
      border-radius: 0 10px 10px 0;
      color: var(--text-soft); font-size: .94rem;
    }
    .doc blockquote p:last-child { margin-bottom: 0; }
    .doc code {
      background: var(--bg-2);
      padding: .15rem .4rem;
      border-radius: 4px;
      font-size: .9em;
      font-family: SFMono-Regular, Consolas, monospace;
    }
    .doc pre {
      background: var(--text); color: #e8e8e8;
      padding: 1.2rem; border-radius: 10px;
      overflow-x: auto; margin: 1.4rem 0;
      font-size: .88rem; line-height: 1.6;
    }
    .doc pre code { background: transparent; padding: 0; color: inherit; }
    .doc table {
      width: 100%; border-collapse: collapse;
      margin: 1.4rem 0; font-size: .92rem;
    }
    .doc th, .doc td {
      padding: .7rem 1rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }
    .doc th {
      background: var(--bg-2); font-weight: 700;
      color: var(--text);
    }
    .doc a { font-weight: 500; }

    /* Back to top */
    .to-top {
      position: fixed; bottom: 2rem; right: 2rem;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--text); color: #fff;
      display: none; align-items: center; justify-content: center;
      font-size: 1.1rem;
      cursor: pointer; border: none;
      box-shadow: 0 4px 16px rgba(35,46,66,.2);
      transition: transform .2s;
    }
    .to-top:hover { transform: translateY(-3px); }
    .to-top.visible { display: flex; }

    /* Footer */
    .doc-footer {
      max-width: 760px; margin: 0 auto;
      padding: 2rem 2rem 4rem;
      border-top: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
      font-size: .88rem; color: var(--muted);
    }
    .doc-footer a {
      border-bottom: 1px solid var(--line);
      padding-bottom: 1px;
    }
    @media (max-width: 720px) {
      .top-bar { padding: .8rem 1rem; }
      .top-bar .brand { font-size: .88rem; }
      .top-bar .actions a { padding: .4rem .75rem; font-size: .76rem; }
      .intro, .doc { padding-left: 1.2rem; padding-right: 1.2rem; }
      .doc-footer { flex-direction: column; gap: .8rem; align-items: flex-start; padding-left: 1.2rem; padding-right: 1.2rem; }
    }

    /* Loading state */
    .loading {
      text-align: center; padding: 4rem 1rem; color: var(--muted);
      font-size: .9rem;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a class="brand" href="/" style="border-bottom:none;">
      <span class="dot"></span>
      <span>구건우 · Gunwoo Ku</span>
    </a>
    <div class="actions">
      <a class="ghost" href="/#strategy">← 포트폴리오로</a>
      <a class="primary" href="/mediology-strategy-brief.pdf" download="구건우_메디올로지_전략브리프.pdf">PDF 브리프 다운로드</a>
    </div>
  </div>

  <div class="intro">
    <div class="eyebrow">Brand · Content Strategy Proposal</div>
    <h1>메디올로지 브랜드 · 콘텐츠 전략 제안서</h1>
    <p style="color: var(--text-soft); font-size: 1.05rem; line-height: 1.75;">
      정설아 대표님이 여신 "0차 의료"라는 카테고리를, 사람들의 언어 속에 심는 일. 제가 합류 첫 2주에 무엇을 할지에 대한 초안입니다.
    </p>
    <div class="meta">
      <div><b>작성자</b> 구건우 (지원자)</div>
      <div><b>수신</b> 정설아 대표님</div>
      <div><b>날짜</b> 2026년 4월 17일</div>
      <div><b>분량</b> 약 6,500자 · 브리프 5장</div>
    </div>
  </div>

  <div class="doc" id="doc">
    <div class="loading">전략서를 불러오는 중입니다…</div>
  </div>

  <div class="doc-footer">
    <span>구건우 · Mediology 지원 포트폴리오</span>
    <a href="/#strategy">← 포트폴리오 돌아가기</a>
  </div>

  <button class="to-top" id="toTop" aria-label="맨 위로">↑</button>

  <script>
    // Load and render markdown
    fetch('/strategy.md')
      .then(r => r.text())
      .then(md => {
        // Skip the first H1 (we render it in intro)
        const withoutFirstH1 = md.replace(/^#\s+.+\n/, '');
        document.getElementById('doc').innerHTML = marked.parse(withoutFirstH1);
      })
      .catch(err => {
        document.getElementById('doc').innerHTML =
          '<p style="color:#c9524f;">전략서를 불러올 수 없습니다. <a href="/strategy.md">원본 파일 보기</a></p>';
      });

    // Back to top visibility
    const toTop = document.getElementById('toTop');
    window.addEventListener('scroll', () => {
      toTop.classList.toggle('visible', window.scrollY > 500);
    });
    toTop.addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
  </script>
</body>
</html>
